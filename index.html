<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>居護行程動態表</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f6fa; --card:#ffffff; --ink:#2d3436; --muted:#8a8f98;
  --brand:#305496; --brand2:#4472c4; --line:#e4e7ee;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif; background:var(--bg); color:var(--ink); padding:10px 8px;}
.wrap{max-width:none; margin:0 auto;}
h1{font-size:22px; color:var(--brand); margin-bottom:4px;}
.sub{color:var(--muted); font-size:13px; margin-bottom:14px;}

.tabs{display:flex; gap:8px; margin-bottom:12px;}
.tab{padding:8px 22px; border-radius:8px 8px 0 0; background:#dfe4ee; cursor:pointer; font-weight:bold; border:1px solid var(--line); border-bottom:none; user-select:none;}
.tab.active{background:var(--brand); color:#fff;}

.upload{background:var(--card); border:2px dashed var(--brand2); border-radius:10px; padding:16px; text-align:center; margin-bottom:14px; cursor:pointer; transition:.15s;}
.upload:hover,.upload.drag{background:#eef3fc; border-color:var(--brand);}
.upload b{color:var(--brand);}
.upload .hint{font-size:12px; color:var(--muted); margin-top:4px;}
#fileInput{display:none;}

.toolbar{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
.month-nav{display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:4px 8px;}
.month-nav button{border:none; background:none; font-size:16px; cursor:pointer; padding:4px 8px; color:var(--brand); font-weight:bold;}
.month-label{font-weight:bold; font-size:15px; min-width:96px; text-align:center;}
.btn{border:1px solid var(--line); background:var(--card); border-radius:8px; padding:7px 14px; cursor:pointer; font-size:13px;}
.btn:hover{background:#eef3fc;}
.btn.danger{color:#c0392b;}
.btn.primary{background:var(--brand); color:#fff; border-color:var(--brand);}
.btn:disabled{opacity:.45; cursor:not-allowed;}
.spacer{flex:1;}
.status{font-size:12px; color:var(--muted);}

.zonebar{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:8px 12px; margin-bottom:10px; font-size:13px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.zonebar b{color:var(--brand); margin-right:2px;}
.zchip{padding:4px 13px; border-radius:14px; border:1.5px solid var(--line); cursor:pointer; user-select:none; color:var(--muted); background:#f2f3f7; font-weight:bold;}
.zchip.on{background:var(--brand); color:#fff; border-color:var(--brand);}
.zchip.all{border-style:dashed; color:var(--brand2); background:#fff; font-weight:normal;}
.zchip{cursor:grab;}
.zchip.dropover{outline:3px dashed #e67e22; outline-offset:1px;}
.table-card{background:var(--card); border:1px solid var(--line); border-radius:10px; overflow-x:auto; margin-bottom:14px;}
table{border-collapse:collapse; width:100%; font-size:13px; min-width:900px;}
th,td{border:1px solid var(--line); padding:5px 7px; text-align:center; vertical-align:middle;}
thead th{background:var(--brand); color:#fff; position:sticky; top:0; z-index:2; font-size:13px; box-shadow:0 2px 4px rgba(0,0,0,.15);}
thead th.zone{background:var(--brand2);}
td.day,td.wd{width:44px; font-weight:bold; background:#fafbfd;}
tr.wknd td{background:#f1f2f6;}
tr.wknd td.day,tr.wknd td.wd{background:#e8eaf0;}
td.cnt{width:56px; font-weight:bold; font-size:14px; cursor:pointer;}
td.nurse{width:72px; cursor:pointer; color:#4a6da7; font-size:12.5px;}
td.nurse:hover{outline:2px solid var(--brand2); outline-offset:-2px;}
th.nursehd{font-size:12px;}
td.cnt:hover{outline:2px solid var(--brand2); outline-offset:-2px;}
td.dists{text-align:left; min-width:200px;}
td.dists.dropover{outline:3px dashed var(--brand2); outline-offset:-3px; background:#eef3fc !important;}
.today td.day{background:#ffe082 !important;}

.chip{display:inline-flex; align-items:center; gap:3px; padding:2px 6px 2px 9px; border-radius:12px; margin:2px 3px; font-size:12.5px; font-weight:bold; color:#2d3436; background:#eceff4; border:1px solid rgba(0,0,0,.07); cursor:grab; user-select:none;}
.chip:active{cursor:grabbing;}
.chip.dragging{opacity:.4;}
.chip.dropover{outline:3px dashed #e67e22; outline-offset:1px; transform:scale(1.08); background:#fff3e0 !important;}
.chip.unknown{border:1.5px dashed #c0392b;}
.chip .cbadge{background:rgba(0,0,0,.55); color:#fff; font-size:10.5px; border-radius:9px; padding:0 5px; line-height:15px; font-weight:bold;}
.chip .x{cursor:pointer; font-size:11px; opacity:.45; padding:0 2px; border-radius:50%; line-height:1;}
.chip .x:hover{opacity:1; color:#c0392b;}
.addbtn{display:inline-block; width:22px; height:22px; line-height:20px; text-align:center; border-radius:50%; border:1.5px dashed var(--brand2); color:var(--brand2); cursor:pointer; font-weight:bold; margin:2px 3px; vertical-align:middle; font-size:14px; user-select:none;}
.addbtn:hover{background:var(--brand2); color:#fff; border-style:solid;}

/* ===== 可互動、可捲動的浮標視窗 ===== */
#tip{position:fixed; z-index:80; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,.18); width:360px; display:none; font-size:12.5px; pointer-events:auto;}
#tip .tip-head{display:flex; align-items:center; justify-content:space-between; padding:9px 12px 7px; border-bottom:1px solid var(--line); position:sticky; top:0; background:#fff; border-radius:10px 10px 0 0;}
#tip .tip-head h4{font-size:13.5px; color:var(--brand);}
#tip .tip-head .hint{font-size:10.5px; color:var(--muted); font-weight:normal;}
#tip .tip-close{cursor:pointer; font-size:14px; color:var(--muted); padding:2px 6px; border-radius:6px; line-height:1;}
#tip .tip-close:hover{background:#fdeeee; color:#c0392b;}
#tip .tip-body{overflow-y:auto; overscroll-behavior:contain; padding:4px 12px 10px;}
#tip .tip-body::-webkit-scrollbar{width:8px;}
#tip .tip-body::-webkit-scrollbar-thumb{background:#c5cbd6; border-radius:4px;}
#tip .tip-foot{padding:8px 12px; border-top:1px solid var(--line); background:#fff; border-radius:0 0 10px 10px; text-align:right;}
#tip .psel{width:15px; height:15px; accent-color:var(--brand2); cursor:pointer; margin-right:2px; vertical-align:middle;}
#tip .person{padding:7px 0; border-bottom:1px dashed #edf0f5;}
#tip .person[draggable="true"]{cursor:grab;}
#tip .person.dragging{opacity:.4;}
#tip .person .phandle{color:#b8bfca; margin-right:2px; font-size:11px;}
#tip .person:last-child{border-bottom:none;}
#tip .pname{font-weight:bold; display:flex; align-items:center; flex-wrap:wrap; gap:4px;}
#tip .drag-h{color:#b6bcc7; cursor:grab; font-size:13px;}
.pmove{font-size:10.5px; color:var(--brand2); border:1px solid var(--brand2); border-radius:8px; padding:1px 8px; cursor:pointer; font-weight:normal; margin-left:auto;}
.pmove:hover{background:var(--brand2); color:#fff;}
.pmenu{margin-top:5px; background:#f2f6ff; border-radius:8px; padding:5px 8px; font-size:11.5px; color:var(--muted);}
.pzbtn{display:inline-block; background:#fff; border:1.5px solid var(--brand2); color:var(--brand2); border-radius:10px; padding:1px 10px; margin:2px 3px; cursor:pointer; font-weight:bold;}
.pzbtn:hover{background:var(--brand2); color:#fff;}
#tip .paddr{color:#4a6da7; font-size:12px; margin-top:1px;}
#tip .plast{color:#8a6d3b; font-size:11.5px; margin-top:1px;}
#tip .ptube{color:#7b1fa2; font-size:11.5px; margin-top:1px;}
#tip .pnote{color:var(--muted); font-size:11.5px; margin-top:2px; line-height:1.45;}
#tip .none{color:var(--muted); padding:8px 0;}
#tip.pinned{box-shadow:0 6px 24px rgba(0,0,0,.28), 0 0 0 2px var(--brand2);}

.legend{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:14px;}
.legend h3{font-size:14px; margin-bottom:8px; color:var(--brand);}
.legend .row{display:flex; align-items:center; gap:8px; margin:5px 0; font-size:13px;}
.legend .sw{width:34px; height:18px; border-radius:5px; border:1px solid rgba(0,0,0,.1); flex-shrink:0;}

.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:50;}
.modal-bg.show{display:flex;}
.modal{background:#fff; border-radius:12px; padding:20px; width:min(560px,94vw); max-height:88vh; overflow:auto;}
.modal h3{font-size:16px; margin-bottom:10px; color:var(--brand);}
.modal label{font-size:13px; color:var(--muted); display:block; margin:12px 0 5px; font-weight:bold;}
.modal input[type=number]{width:110px; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:15px; font-family:inherit; font-weight:bold;}
.selected-area{min-height:38px; border:1px solid var(--line); border-radius:8px; padding:5px; background:#fafbfd;}
.selected-area .empty{color:var(--muted); font-size:12px; padding:6px;}
.pick-group{margin:7px 0;}
.pick-group .gtitle{font-size:11.5px; color:var(--muted); margin-bottom:3px;}
.pick{display:inline-block; padding:5px 13px; border-radius:14px; margin:3px; font-size:13px; font-weight:bold; cursor:pointer; border:2px solid rgba(0,0,0,.08); user-select:none; transition:.1s;}
.pick:hover{transform:scale(1.06);}
.pick.on{border-color:#2d3436; box-shadow:0 0 0 1.5px #2d3436 inset;}
.pick.on::after{content:" ✓";}
.custom-row{display:flex; gap:8px; margin-top:6px;}
.custom-row input{flex:1; padding:7px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit;}
.modal .acts{display:flex; gap:8px; margin-top:16px; justify-content:flex-end;}

#toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2d3436; color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; opacity:0; transition:.3s; pointer-events:none; z-index:99; max-width:90vw;}
#toast.show{opacity:1;}
.parse-report{background:#eef9f0; border:1px solid #b7e4c0; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:12px; display:none;}
.parse-report.err{background:#fdeeee; border-color:#f0b9b9;}
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 居護行程動態表</h1>
  <div class="sub">上傳 Excel 自動解析｜🖱 拖到空白處＝獨立搬區、<b>拖到另一標籤上＝合併成大群</b>｜點標籤釘選後<b>勾選個案可拆分小標籤</b>，可無限細分｜標籤數字＝人數</div>

  <div class="tabs">
    <div class="tab active" data-org="ivy" onclick="switchOrg('ivy')">常春藤</div>
    <div class="tab" data-org="tree" onclick="switchOrg('tree')">長青樹</div>
  </div>

  <div class="upload" id="dropzone" onclick="document.getElementById('fileInput').click()">
    <b>📄 點擊或拖曳 Excel(.xlsx) 到這裡上傳</b>（可一次多個檔案）
    <div class="hint">自動判別 常春藤／長青樹、訪視日期、各分區人數、行政區、每筆個案的姓名地址備註｜依表頭欄位對應解析</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
  </div>

  <div class="parse-report" id="parseReport"></div>

  <div class="toolbar">
    <div class="month-nav">
      <button onclick="navMonth(-1)">◀</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="navMonth(1)">▶</button>
    </div>
    <div class="month-nav" title="只顯示這個範圍的日期">
      顯示&nbsp;<input type="number" id="dayFrom" min="1" max="31" style="width:54px;padding:4px;border:1px solid var(--line);border-radius:6px;font-family:inherit;" onchange="render()">
      &nbsp;～&nbsp;<input type="number" id="dayTo" min="1" max="31" style="width:54px;padding:4px;border:1px solid var(--line);border-radius:6px;font-family:inherit;" onchange="render()">
      &nbsp;日&nbsp;<button onclick="resetRange()" style="font-size:12px;">全月</button>
    </div>
    <button class="btn" onclick="showNurseStats()">📊 護理師統計</button>
    <button class="btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
    <button class="btn danger" onclick="clearMonth()">🗑 清除本月(此機構)</button>
    <button class="btn" onclick="manualSync()">🔄 同步最新</button>
    <div class="spacer"></div>
    <div class="status" id="saveStatus"></div>
  </div>

  <div class="zonebar" id="zoneBar"></div>

  <div class="table-card"><table id="mainTable"></table></div>

  <details class="legend" id="legendBox">
    <summary style="cursor:pointer;font-size:13.5px;color:var(--brand);font-weight:bold;user-select:none;">🎨 鄰近區顏色圖例（點擊展開／收合）</summary>
    <div id="legendBody" style="margin-top:8px;"></div>
  </details>
</div>

<!-- 個案名單浮標視窗 -->
<div id="tip" onmouseenter="tipHoverIn()" onmouseleave="tipHoverOut()">
  <div class="tip-head">
    <h4 id="tipTitle"></h4>
    <span style="display:flex;align-items:center;gap:6px;">
      <span class="hint" id="tipHint">點標籤可釘選</span>
      <span class="tip-close" onclick="hideTipNow()">✕</span>
    </span>
  </div>
  <div class="tip-body" id="tipBody"></div>
  <div class="tip-foot" id="tipFoot" style="display:none;">
    <button class="btn" id="splitBtn" disabled onclick="splitSelected()">✂ 勾選個案後拆分成小標籤</button>
  </div>
</div>

<!-- 護理師每月統計 Modal -->
<div class="modal-bg" id="nurseModalBg">
  <div class="modal">
    <h3 id="nurseModalTitle">📊 護理師每月個案統計</h3>
    <div id="nurseStatsBody"></div>
    <div class="acts">
      <button class="btn" onclick="exportNurseCSV()">⬇ 匯出統計 CSV</button>
      <button class="btn primary" onclick="closeNurseStats()">關閉</button>
    </div>
  </div>
</div>

<!-- 行政區快選 Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">編輯</h3>
    <label>👥 人數</label>
    <input type="number" id="editCount" min="0">
    <label>📍 已選標籤（依順序，可同名並存，點 × 移除）</label>
    <div class="selected-area" id="selectedArea"></div>
    <label>🎯 點選新增行政區（同組同色）</label>
    <div id="pickerGroups"></div>
    <label>✏️ 自訂（清單沒有的機構或地區）</label>
    <div class="custom-row">
      <input type="text" id="customInput" placeholder="輸入名稱後按新增，例：福安" onkeydown="if(event.key==='Enter')addCustom()">
      <button class="btn" onclick="addCustom()">新增</button>
    </div>
    <div class="acts">
      <button class="btn danger" onclick="deleteCell()">刪除此格</button>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveCell()">儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== 設定 ===== */
const GROUPS = {
  ivy: [
    {names:["士林","大同","中山","松山"], color:"#F8BBD0"},
    {names:["萬華","中正","文山","大安","信義","康庭","福安"], color:"#FFF59D"},
    {names:["平溪","雙溪","貢寮"], color:"#FFCC80"},
    {names:["深坑","石碇","坪林"], color:"#C8E6C9"},
    {names:["南港","內湖","童音","瑞芳","瑞礦"], color:"#90CAF9"},
    {names:["基隆","金山","萬里"], color:"#CE93D8"},
    {names:["汐止","元康","銀泰","童心"], color:"#80DEEA"},
    {names:["桃園"], color:"#FFAB91"},
  ],
  tree: [
    {names:["北投","淡水","三芝","石門","長勤"], color:"#90CAF9"},
    {names:["三重","蘆洲","八里","愛心"], color:"#C8E6C9"},
    {names:["泰山","新莊","板橋","吉康","盛禾"], color:"#FFCC80"},
    {names:["中和","永和","新店","烏來"], color:"#F8BBD0"},
    {names:["土城","樹林","三峽","林口"], color:"#CE93D8"},
    {names:["五股"], color:"#80CBC4"},
    {names:["桃園"], color:"#FFAB91"},
  ]
};
const DEFAULT_ZONES = { ivy:["A","B","C","D","G","H","J1","K","T"], tree:["B","D","E","F","G","J1"] };
const ORG_NAME = { ivy:"常春藤", tree:"長青樹" };
const NURSES = {
  ivy: ["紫群","弘珍","虹霏","詩婷","家儀","美娟","力揚"],
  tree: ["易芬","雅婷","翔伃","于婷","于瑩"]
};
const DISTRICTS = ["中正","大同","中山","松山","大安","萬華","信義","士林","北投","內湖","南港","文山",
"板橋","三重","中和","永和","新莊","新店","土城","蘆洲","汐止","樹林","鶯歌","三峽","淡水","瑞芳",
"五股","泰山","林口","深坑","石碇","坪林","三芝","石門","八里","平溪","雙溪","貢寮","金山","萬里","烏來",
"安樂","暖暖","七堵","仁愛","桃園"];
const KEELUNG = new Set(["安樂","暖暖","七堵","仁愛"]);
const INSTITUTIONS = [["瑞芳礦工","瑞礦"],["元康","元康"],["銀泰","銀泰"],["童音","童音"],["童心","童心"],
["康庭","康庭"],["福安","福安"],["吉康","吉康"],["盛禾","盛禾"],["愛心","愛心"],["長勤","長勤"]];
// 機構標籤：不再用固定機構名清單判別，而是由「地址前綴 (XX機構)」自動偵測（見 parseExcel），
// 標記於 tag.isInst；代表人數 qty 先由「實際申報」欄自動解析（例：15人(NG*11，F*6)→15、
// Foley+5人→5、NG+Foley+3人(NG*1，F*2)→3），亦可釘選後手動編輯。
function tagIsInst(tag){ return !!(tag && tag.isInst); }
// 從「實際申報」文字取代表人數：抓「數字＋人」的第一個（人字前的數字）
function parseInstQty(s){
  const m = String(s||"").match(/(\d+)\s*人/);
  return m ? +m[1] : null;
}
// 標籤有效人數：機構標籤若有 qty（自動解析或手動設定）則以 qty 為準，否則用個案明細筆數
function tagCount(tag){
  if(!tag) return 0;
  if(tag.qty!=null && tag.qty!=="") return +tag.qty;
  return tag.people ? tag.people.length : 0;
}
const WEEK = ["日","一","二","三","四","五","六"];
const STORE_KEY = "careone-schedule-v1";
const NAME_SKIP = new Set(["姓名","地址","電話","備註","一般","重大","榮民","福民","低收","身分","順序","診斷","說明","費用","耗材","小計","家字號","次數","間隔","刷卡","訪視日","預約訪視表","聯絡人","中低收入戶","身分證","出生日期","上次訪視","訪視次數","實際申報","更換管路","中低","境差","人瑞","收入","福保","護理之家","收入戶","經濟差","家境差","清寒","福保重大"]);
const NOTE_SKIP = new Set(["費用","備註","說明","診斷","預計","收費","實際申報","電話","地址","更換管路","傷口","移除","住院","舊案","VPN","工作人員：","耗材：","小計：","部分負擔：","，支出："]);
const NOTE_SKIP_PREFIX = ["方鼎掛號","申報核對","預約訪視：","社會資源","工作人員","部分負擔","小計","耗材","□","登入總表","醫囑單","護理紀錄","身體評估單"];

let data = { ivy:{}, tree:{} };
let curOrg = "ivy";
let curYM = null;
let editing = null;
let tempTags = [];
let dragInfo = null;

/* ===== 共用同步設定 =====
   ★ 部署到 GitHub 時：把下面引號內換成你的 Google Apps Script「網頁應用程式」網址
   （做法見「部署教學.md」）。留空 = 資料只存在本機瀏覽器。 */
const SYNC_URL = "https://script.google.com/macros/s/AKfycby4uDv_JrY6_e0AqRzuRIF8YZLHdc0KlxvMY0EvTOBlWpE5hZxdCS_ZvtdlEZdpAKlB/exec";

const hasRemote = SYNC_URL.startsWith("https://script.google.com/");
let userName = "";
let lastUpdatedAt = 0;
let pendingSave = false;

function initUser(){
  try{ userName = localStorage.getItem('careone-user') || ""; }catch(e){}
  if(hasRemote && !userName){
    userName = (prompt("請輸入你的名字（會顯示給其他共用者）","") || "匿名").trim() || "匿名";
    try{ localStorage.setItem('careone-user', userName); }catch(e){}
  }

/* ===== 儲存（雲端共用 → Claude → 本機 三層自動選擇）===== */
async function loadData(){
  if(hasRemote){
    try{
      const r = await fetch(SYNC_URL + "?t=" + Date.now());
      const j = await r.json();
      if(j && j.data) data = j.data;
      lastUpdatedAt = j.updatedAt || 0;
      migrateAll();
      setStatus("✓ 已載入共用資料｜最後更新：" + fmtDT(lastUpdatedAt) + (j.user ? `（${j.user}）` : ""));
      return;
    }catch(e){ setStatus("⚠ 無法連線共用資料庫，改用本機模式"); }
  }
  if(window.storage && window.storage.get){
    try{
      const r = await window.storage.get(STORE_KEY);
      if(r && r.value) data = JSON.parse(r.value);
      migrateAll();
      setStatus("✓ 已載入儲存的資料");
      return;
    }catch(e){}
  }
  try{
    const s = localStorage.getItem(STORE_KEY);
    if(s) data = JSON.parse(s);
    migrateAll();
    setStatus("✓ 已載入本機資料");
  }catch(e){ setStatus("（尚無儲存資料，開始使用吧）"); }
}
let saveTimer=null;
function saveData(){
  clearTimeout(saveTimer);
  pendingSave = true;
  setStatus("儲存中…");
  saveTimer=setTimeout(async ()=>{
    const now = new Date().toLocaleTimeString('zh-TW',{hour12:false});
    if(hasRemote){
      try{
        const r = await fetch(SYNC_URL, {method:'POST', body: JSON.stringify({data, user:userName})});
        const j = await r.json();
        lastUpdatedAt = j.updatedAt || Date.now();
        setStatus("✓ 已同步｜最後更新：" + fmtDT(lastUpdatedAt) + `（${userName}）`);
      }catch(e){ setStatus("⚠ 同步失敗，請按 🔄 同步重試"); }
      pendingSave = false;
      return;
    }
    if(window.storage && window.storage.set){
      try{
        await window.storage.set(STORE_KEY, JSON.stringify(data));
        setStatus("✓ 已自動儲存 " + now);
        pendingSave = false;
        return;
      }catch(e){}
    }
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
      setStatus("✓ 已儲存(本機) " + now);
    }catch(e){ setStatus("⚠ 儲存失敗"); }
    pendingSave = false;
  }, 500);
}

/* ===== 自動拉取他人更新 ===== */
async function pollRemote(force){
  if(!hasRemote || pendingSave) return;
  if(document.getElementById('modalBg').classList.contains('show')) return;  // 編輯中不打擾
  if(!force && tipPinned) return;  // 釘選閱讀中不打擾
  try{
    const r = await fetch(SYNC_URL + "?t=" + Date.now());
    const j = await r.json();
    if(j && j.updatedAt && (force || j.updatedAt > lastUpdatedAt)){
      if(j.updatedAt !== lastUpdatedAt){
        data = j.data || data;
        lastUpdatedAt = j.updatedAt;
        migrateAll();
        render();
        toast(`已同步最新資料${j.user?`（${j.user} 更新）`:""}`);
      }
      setStatus("✓ 已同步｜最後更新：" + fmtDT(lastUpdatedAt) + (j.user?`（${j.user}）`:""));
    }
  }catch(e){}
}
async function manualSync(){
  if(!hasRemote){ toast("尚未設定共用資料庫（見 部署教學.md）"); return; }
  setStatus("同步中…");
  await pollRemote(true);
}
function setStatus(t){ document.getElementById('saveStatus').textContent=t; }
function fmtDT(ts){
  if(!ts) return "—";
  const d = new Date(ts);
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function colorOf(org, name){
  const key = name.trim();
  for(const g of GROUPS[org]) if(g.names.includes(key)) return g.color;
  return null;
}

/* ===== 資料結構 v2：標籤陣列（允許同名）＋ 舊格式相容 =====
   舊：{count, districts:["汐止",...], people:{汐止:[...]}, nurse}
   新：{count, tags:[{name:"汐止", people:[...]},...], nurse}   */
function normalizeRec(rec){
  if(!rec || rec.tags) return rec;
  const tags = [];
  (rec.districts||[]).forEach(d=>{
    tags.push({name:d, people:(rec.people && rec.people[d]) ? rec.people[d] : []});
  });
  rec.tags = tags;
  delete rec.districts;
  delete rec.people;
  return rec;
}
function migrateAll(){
  for(const org of Object.keys(data)){
    for(const day of Object.values(data[org]||{})){
      for(const z of Object.keys(day)) normalizeRec(day[z]);
    }
  }
}
function getRec(org, dateISO, zone){
  const r = (data[org][dateISO]||{})[zone];
  return r ? normalizeRec(r) : r;
}
function ensureCell(org, dateISO, zone){
  if(!data[org][dateISO]) data[org][dateISO]={};
  if(!data[org][dateISO][zone]) data[org][dateISO][zone]={count:0, tags:[]};
  return normalizeRec(data[org][dateISO][zone]);
}



/* ===== Excel 解析（SheetJS）：結構化來源 =====
   實測結構（預約訪視表-0721/0722.xlsx）：單一工作表，各 PDF 頁區塊垂直堆疊、大量合併儲存格；
   頁首列（護理所名＋預約訪視表）→ 分區列（某格「A區總人數：13」）→ 雙列表頭 → 每筆個案 2 列
   （主列＝序號/訪視日/姓名/電話/診斷/更換管路/預計收費/備註；「✚」列＝上次訪視/地址）。
   新案副表表頭含「聯絡人」，電話/地址欄位置不同、無上次訪視。
   欄位對應完全依「表頭文字」動態決定（找到表頭列後以關鍵字定位各欄索引），不用固定索引或座標猜測。
   輸出 zones 結構 {zone:{count,districts,people}}。 */
async function parseExcel(file){
  if(typeof XLSX === "undefined") throw new Error("SheetJS 未載入（請確認網路可連 cdnjs）");
  const wb = XLSX.read(await file.arrayBuffer(), {type:"array"});
  let org=null, dateISO=null, curZone=null, cols=null, pending=null;
  const zones={}; const unknowns=[]; const dateTally={};
  let mainHdrs=0, subHdrs=0;
  const distRe = new RegExp("(台北市|新北市|基隆市|桃園市)?(" + DISTRICTS.join("|") + ")區");
  const dateRe = /1\d{2}-\d{2}-\d{2}/;
  const nameReject = /姓名|刷卡|順序|身分|收費|日期|實際|訪視|電話|地址|備註|診斷|聯絡|申報|管路|預計|說明|費用|序號|間隔|次數/;
  const cellS = v => String(v==null?"":v).trim();
  const tidy = s => String(s||"").replace(/\s*=\s*_{3,}/g,"").replace(/_{3,}/g,"").replace(/\s+/g," ").trim();
  function cleanName(s){
    s=s.replace(/1\d{2}-\d{2}-\d{2}/g,"");
    s=s.replace(/[0-9A-Za-z().（）\/／+＋★@]+/g,"");
    return s.replace(/\s+/g,"").replace(/^[-－ ]+|[-－ ]+$/g,"");
  }
  function ensureZone(z){ if(!zones[z]) zones[z]={count:0,districts:[],people:{}}; return zones[z]; }
  function finalize(){
    if(pending && pending.zone){
      let d=pending.district;
      if(!d){
        const blob=(pending.name||"")+" "+(pending.rawAddr||"")+" "+(pending.note||"");
        for(const [kw,alias] of INSTITUTIONS){ if(blob.includes(kw)){ d=alias; break; } }
      }
      if(!d){ d="未判定"; unknowns.push(`${pending.zone}區 ${pending.name||"（無名）"}`); }
      const z=ensureZone(pending.zone);
      if(!z.districts.includes(d)) z.districts.push(d);
      if(!z.people[d]) z.people[d]=[];
      z.people[d].push({
        name: pending.name||"（未識別）",
        addr: pending.addr||pending.rawAddr||"",
        last: pending.last||"",
        tube: tidy(pending.tube),
        note: tidy(pending.note)
      });
      // 機構單位（地址前綴 (XX機構)）：標記並累計代表人數（由「實際申報」欄解析）
      if(pending.isInst){
        z.instFlag = z.instFlag || {}; z.instFlag[d] = true;
        const q = parseInstQty(pending.apply);
        if(q!=null){ z.instQty = z.instQty || {}; z.instQty[d] = (z.instQty[d]||0) + q; }
      }
    }
    pending=null;
  }
  for(const sn of wb.SheetNames){
    const sheetRows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:"", raw:false});
    curZone=null; cols=null;
    for(let r=0; r<sheetRows.length; r++){
      const row=(sheetRows[r]||[]).map(cellS);
      const joined=row.join(" ");
      if(!joined.trim()) continue;
      if(!org){ if(joined.includes("常春藤")) org="ivy"; else if(joined.includes("長青樹")) org="tree"; }
      // 頁首雜訊列（護理所名／VPN 清單／方鼎掛號…都在這幾格）
      if(joined.includes("預約訪視表") || joined.includes("careone.com.tw")) continue;
      // 分區標頭：某一格為「X區總人數：N」
      let zm=null;
      for(const c of row){ const m=c.match(/^([A-Z]*\d*)區總人數[：:]\s*(\d+)$/); if(m){ zm=m; break; } }
      if(zm){
        finalize();
        let z=zm[1]||"";
        if(!z || /^P\d*$/.test(z) || /^\d+$/.test(z)) z="其他";
        curZone=z;
        ensureZone(z).count=+zm[2];
        continue;
      }
      // 表頭列：含「姓名」與「訪視日」→ 依表頭文字建立欄位對應（雙列表頭：下一列有 地址/身分/出生日期…）
      const flat=row.map(c=>c.replace(/\s+/g,""));
      if(flat.some(c=>c.includes("姓名")) && flat.some(c=>c.includes("訪視日"))){
        const h2=((sheetRows[r+1])||[]).map(v=>cellS(v).replace(/\s+/g,""));
        const fc=(arr,kw)=>arr.findIndex(c=>c.includes(kw));
        cols={
          seq:  fc(flat,"序"),
          date: fc(flat,"訪視日"),
          last: fc(flat,"上次訪視"),
          name: fc(flat,"姓名"),
          tube: fc(flat,"更換管路"),
          note: fc(flat,"備註"),
          apply:fc(flat,"實際申報"),
          addr: fc(h2,"地址")>=0 ? fc(h2,"地址") : fc(flat,"電話")
        };
        if(flat.some(c=>c.includes("聯絡人"))) subHdrs++; else mainHdrs++;
        // 第二列表頭併入後跳過
        if(h2.some(c=>/地址|身分|出生日期|家字號|訪視次數/.test(c))) r++;
        continue;
      }
      if(!cols || !curZone) continue;
      const seqv = cols.seq>=0 ? row[cols.seq] : "";
      if(/^\d{1,3}$/.test(seqv)){
        // ── 個案主列 ──
        finalize();
        let nm=cleanName(cols.name>=0 ? row[cols.name] : "");
        if(NAME_SKIP.has(nm) || nameReject.test(nm) || nm.length<2) nm="";
        if(cols.date>=0){ const dm2=row[cols.date].match(dateRe); if(dm2) dateTally[dm2[0]]=(dateTally[dm2[0]]||0)+1; }
        pending={
          zone:curZone, name:nm||null, district:null, addr:null, rawAddr:null, last:null, isInst:false,
          apply: cols.apply>=0 ? row[cols.apply] : "",
          tube: cols.tube>=0 ? row[cols.tube] : "",
          note: cols.note>=0 ? row[cols.note] : ""
        };
        continue;
      }
      // ── 接續列（「✚」列：上次訪視、地址；其餘跨列備註/管路併入）──
      if(!pending) continue;
      if(cols.last>=0 && !pending.last && row[cols.last]){
        const m2=row[cols.last].match(dateRe); if(m2) pending.last=m2[0];
      }
      if(cols.addr>=0 && row[cols.addr]){
        const at=row[cols.addr];
        // 機構單位：地址前綴 (XX機構) → 以機構名成一個獨立可編輯人數的標籤（優先於行政區判定）
        const im=at.match(/[（(]\s*(.+?)\s*機構\s*[）)]\s*(.*)$/);
        if(im && pending.district===null){
          pending.district = im[1].trim();
          pending.addr = (im[2]||"").trim() || at;
          pending.isInst = true;
        }else{
          const dm=at.match(distRe);
          let d=null, idx=-1;
          if(dm){
            d=dm[2];
            if(dm[1]==="基隆市" || KEELUNG.has(d)) d="基隆";
            if(dm[1]==="桃園市" || d==="桃園") d="桃園";
            idx=dm.index;
          }else{
            // 桃園市轄下任何行政區（蘆竹、龜山、中壢…不在 DISTRICTS 清單內）一律歸「桃園」
            const ti=at.indexOf("桃園市");
            if(ti>=0){ d="桃園"; idx=ti; }
          }
          if(d!==null){
            if(pending.district===null){ pending.district=d; pending.addr=at.slice(idx); }
            else pending.addr=(pending.addr||"")+" / "+at.slice(idx);
          }else if(!pending.rawAddr && !dateRe.test(at) && /[路街巷弄號段村里鄰]/.test(at)){
            pending.rawAddr=at;   // 沒有行政區關鍵字的地址，保留供顯示
          }
        }
      }
      // 實際申報若落在接續列，補抓（機構代表人數來源）
      if(cols.apply>=0 && !pending.apply && row[cols.apply]) pending.apply=row[cols.apply];
      if(cols.tube>=0 && row[cols.tube] && !row[cols.tube].includes("更換管路") && !/^[=_\s✚+]+$/.test(row[cols.tube]))
        pending.tube=(pending.tube?pending.tube+" ":"")+row[cols.tube];
      if(cols.note>=0 && row[cols.note] && !/^[=_\s✚+]+$/.test(row[cols.note]))
        pending.note=(pending.note?pending.note+" ":"")+row[cols.note];
    }
    finalize();
  }
  // 訪視日期：取個案「訪視日」欄出現最多次者（實測整檔一致；檔名日期可能與內容差一天，以內容為準）
  let best=null, bn=0;
  for(const [k,v] of Object.entries(dateTally)) if(v>bn){ bn=v; best=k; }
  if(best){ const m=best.match(/(1\d{2})-(\d{2})-(\d{2})/); if(m) dateISO=`${+m[1]+1911}-${m[2]}-${m[3]}`; }
  return {org, dateISO, zones, unknowns, filename:file.name, src:"Excel", mainHdrs, subHdrs};
}

async function handleFiles(files){
  const report = document.getElementById('parseReport');
  const msgs=[];
  let ok=0;
  for(const f of files){
    const ext=(f.name.toLowerCase().match(/\.([a-z0-9]+)$/)||[])[1]||"";
    let src="";
    try{
      let r;
      if(ext==="xlsx"||ext==="xls"){ src="Excel"; r=await parseExcel(f); }
      else { msgs.push(`⚠ ${f.name}：非 Excel(.xlsx)，略過${ext==="pdf"?"（本版僅支援 Excel，請改用 CareOne 匯出的 xlsx）":""}`); continue; }
      if(!r.org || !r.dateISO || Object.keys(r.zones).length===0){
        msgs.push(`⚠ ${f.name}【來源：${src}】：無法辨識（機構=${r.org?ORG_NAME[r.org]:'?'}，日期=${r.dateISO||'?'}）`);
        continue;
      }
      // 重新上傳同一天：整日覆蓋為最新內容（僅保留各分區已手動指定的護理師）
      const oldDay = data[r.org][r.dateISO] || {};
      const oldNurses = {};
      for(const [z,rec0] of Object.entries(oldDay)){ if(rec0){ const rr=normalizeRec(rec0); if(rr.nurse) oldNurses[z]=rr.nurse; } }
      const hadDay = Object.keys(oldDay).length>0;
      data[r.org][r.dateISO] = {};
      const parts=[];
      let mismatch=[];
      for(const [z,info] of Object.entries(r.zones)){
        // 解析結果（districts/people）→ 新標籤陣列格式
        data[r.org][r.dateISO][z] = {count:info.count, tags: info.districts.map(d=>{
          const tg = {name:d, people: info.people[d]||[]};
          if(info.instFlag && info.instFlag[d]){ tg.isInst=true; if(info.instQty && info.instQty[d]!=null) tg.qty=info.instQty[d]; }
          return tg;
        }), nurse: oldNurses[z]||""};
        const parsed = Object.values(info.people).reduce((s,a)=>s+a.length,0);
        if(parsed !== info.count) mismatch.push(`${z}區(宣告${info.count}/解析${parsed})`);
        const dd = info.districts.map(d=>`${d}${info.people[d]?info.people[d].length:""}`).join("、");
        parts.push(`${z}區${info.count}人（${dd||"—"}）`);
      }
      let line = `✅ ${f.name}【來源：${src}】→ ${ORG_NAME[r.org]} ${r.dateISO}：${parts.join("；")}`;
      line += `｜表頭定位：主表 ${r.mainHdrs} 段${r.subHdrs?`、新案表 ${r.subHdrs} 段`:""}`;
      if(hadDay) line += `<br>　🔄 已覆蓋此日期原有暫存資料（保留原護理師指定）`;
      if(r.unknowns.length) line += `<br>　⚠ 未判定行政區：${r.unknowns.join("、")}（已標紅框，可拖曳或編輯歸類）`;
      if(mismatch.length) line += `<br>　⚠ 人數核對不符：${mismatch.join("、")}，請人工確認`;
      msgs.push(line);
      ok++;
      curOrg = r.org;
      curYM = r.dateISO.slice(0,7);
    }catch(e){
      msgs.push(`❌ ${f.name}${src?`【來源：${src}】`:""}：解析錯誤 ${e.message}`);
    }
  }
  report.innerHTML = msgs.join("<br>");
  report.className = "parse-report" + (ok===0 ? " err" : "");
  report.style.display = "block";
  if(ok>0){ saveData(); }
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.org===curOrg));
  render();
  toast(ok>0 ? `已更新 ${ok} 個檔案的資料` : "沒有成功解析的檔案");
}

/* ===== 表格 ===== */
function zonesForMonth(org, ym){
  const set = new Set(DEFAULT_ZONES[org]);
  for(const [d, zs] of Object.entries(data[org])){
    if(d.startsWith(ym)) Object.keys(zs).forEach(z=>set.add(z));
  }
  const ord = zoneOrder(org);
  return [...set].sort((a,b)=>{
    const ia=ord.indexOf(a), ib=ord.indexOf(b);
    if(ia>=0 && ib>=0) return ia-ib;
    if(ia>=0) return -1;
    if(ib>=0) return 1;
    return a<b?-1:(a>b?1:0);
  });
}
/* ===== 區欄位順序（拖曳 zonebar 晶片換位）===== */
function zoneOrder(org){
  try{ return JSON.parse(localStorage.getItem('careone-zoneorder-'+org)||'[]'); }catch(e){ return []; }
}
function saveZoneOrder(arr){
  try{ localStorage.setItem('careone-zoneorder-'+curOrg, JSON.stringify(arr)); }catch(e){}
}
let zoneDragName=null;
function zoneDragStart(ev,z){ zoneDragName=z; ev.dataTransfer.effectAllowed="move"; }
function zoneDragEnd(){ zoneDragName=null; document.querySelectorAll('.zchip.dropover').forEach(el=>el.classList.remove('dropover')); }
function zoneDragOver(ev){ if(!zoneDragName) return; ev.preventDefault(); ev.dataTransfer.dropEffect="move"; ev.currentTarget.classList.add('dropover'); }
function zoneDragLeave(ev){ ev.currentTarget.classList.remove('dropover'); }
function zoneDrop(ev, target){
  ev.preventDefault(); ev.currentTarget.classList.remove('dropover');
  const src=zoneDragName; zoneDragName=null;
  if(!src || src===target) return;
  const arr=zonesForMonth(curOrg, curYM).filter(z=>z!==src);
  arr.splice(arr.indexOf(target), 0, src);
  saveZoneOrder(arr); render();
  toast(`已將 ${src}區 移到 ${target}區 前面`);
}
function hiddenZones(){
  try{ return new Set(JSON.parse(localStorage.getItem('careone-zonehide-'+curOrg)||'[]')); }catch(e){ return new Set(); }
}
function saveHiddenZones(set){
  try{ localStorage.setItem('careone-zonehide-'+curOrg, JSON.stringify([...set])); }catch(e){}
}
function toggleZone(z){
  const h = hiddenZones();
  if(h.has(z)) h.delete(z); else h.add(z);
  saveHiddenZones(h); render();
}
function showAllZones(){ saveHiddenZones(new Set()); render(); }
function render(){
  hideTipNow();
  const [Y,M] = curYM.split("-").map(Number);
  document.getElementById('monthLabel').textContent = `${Y}年${M}月`;
  const days = new Date(Y, M, 0).getDate();
  const allZones = zonesForMonth(curOrg, curYM);
  const hid = hiddenZones();
  const zones = allZones.filter(z=>!hid.has(z));
  document.getElementById('zoneBar').innerHTML = '<b>顯示區域：</b>' +
    allZones.map(z=>`<span class="zchip${hid.has(z)?'':' on'}" draggable="true"
      ondragstart="zoneDragStart(event,'${z}')" ondragend="zoneDragEnd()"
      ondragover="zoneDragOver(event)" ondragleave="zoneDragLeave(event)" ondrop="zoneDrop(event,'${z}')"
      onclick="toggleZone('${z}')" title="點擊顯示/隱藏，拖曳可換位">${z}區</span>`).join('') +
    `<span class="zchip all" onclick="showAllZones()">全部顯示</span>
     <span style="font-size:11px;color:var(--muted);">（拖曳晶片可調整欄位左右順序）</span>`;
  const todayISO = new Date().toISOString().slice(0,10);

  let html = "<thead><tr><th>日</th><th>週</th>";
  for(const z of zones) html += `<th>人數</th><th class="nursehd">護理師</th><th class="zone">${z}區 行政區</th>`;
  html += "</tr></thead><tbody>";

  let f = parseInt(document.getElementById('dayFrom').value);
  let t = parseInt(document.getElementById('dayTo').value);
  if(!f && !t){
    // 預設固定顯示 5 日：本月從今天起、其他月份從 1 號起（按「全月」可看整月）
    const now = new Date();
    const isCur = now.getFullYear()===Y && (now.getMonth()+1)===M;
    f = isCur ? Math.min(now.getDate(), Math.max(1, days-4)) : 1;
    t = f + 4;
  }else{ f = f||1; t = t||days; }
  f = Math.max(1, Math.min(f, days));
  t = Math.max(f, Math.min(t, days));
  for(let d=f; d<=t; d++){
    const dateISO = `${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wd = WEEK[new Date(Y, M-1, d).getDay()];
    const wknd = (wd==="六"||wd==="日") ? " wknd" : "";
    const today = dateISO===todayISO ? " today" : "";
    html += `<tr class="${wknd}${today}"><td class="day">${d}</td><td class="wd">${wd}</td>`;
    const rec = data[curOrg][dateISO] || {};
    for(const z of zones){
      const info = rec[z] ? normalizeRec(rec[z]) : null;
      const cnt = info ? info.count : "";
      let chips = "";
      if(info) info.tags.forEach((tag, i)=>{
        const c = colorOf(curOrg, tag.name);
        const ppl = tagCount(tag);
        const inst = tagIsInst(tag);
        const badge = ppl ? `<span class="cbadge">${ppl}</span>` : "";
        const unk = tag.name==="未判定" ? " unknown" : "";
        chips += `<span class="chip${unk}" draggable="true" title="${inst?'機構標籤：釘選後可編輯代表人數':''}" style="${c?`background:${c};`:""}"
          ondragstart="dragStart(event,'${dateISO}','${z}',${i})" ondragend="dragEnd(event)"
          ondragover="chipDragOver(event)" ondragleave="chipDragLeave(event)" ondrop="chipDrop(event,'${dateISO}','${z}',${i})"
          onmouseenter="chipEnter(event,'${dateISO}','${z}',${i})" onmouseleave="chipLeave()"
          onclick="chipPin(event,'${dateISO}','${z}',${i})"
          >${tag.name}${badge}<span class="x" onclick="quickRemove(event,'${dateISO}','${z}',${i})">✕</span></span>`;
      });
      chips += `<span class="addbtn" title="新增行政區" onclick="openModal('${dateISO}','${z}')">＋</span>`;
      html += `<td class="cnt" onclick="openModal('${dateISO}','${z}')">${cnt}</td>`;
      const nurse = info && info.nurse ? info.nurse : "";
      html += `<td class="nurse" onclick="editNurse('${dateISO}','${z}',event)" title="點擊選擇護理師">${nurse}</td>`;
      html += `<td class="dists" data-date="${dateISO}" data-zone="${z}"
        ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropChip(event)">${chips}</td>`;
    }
    html += "</tr>";
  }
  html += "</tbody>";
  document.getElementById('mainTable').innerHTML = html;
  renderLegend();
}
function renderLegend(){
  let h = `<div style="font-size:12px;color:var(--muted);margin-bottom:5px;">${ORG_NAME[curOrg]}｜拖到空白處＝獨立、拖到標籤上＝合併大群、釘選後勾選拆分、✕ 移除、「＋」新增</div>`;
  GROUPS[curOrg].forEach((g,i)=>{
    h += `<div class="row"><div class="sw" style="background:${g.color}"></div><b>${i+1}.</b> ${g.names.join("、")}</div>`;
  });
  document.getElementById('legendBody').innerHTML = h;
}

/* ===== 拖曳搬移 ===== */
function dragStart(ev, dateISO, zone, idx){
  dragInfo = {dateISO, zone, idx};
  ev.dataTransfer.effectAllowed = "move";
  ev.target.classList.add('dragging');
  hideTipNow();
}
function dragEnd(ev){
  ev.target.classList.remove('dragging');
  document.querySelectorAll('.chip.dropover, td.dists.dropover').forEach(el=>el.classList.remove('dropover'));
}
let draggingPerson = false;
function personDragStart(ev, dateISO, zone, tagIdx, pIdx){
  ev.stopPropagation();
  draggingPerson = true;
  dragInfo = {type:'person', dateISO, zone, tagIdx, pIdx};
  ev.dataTransfer.effectAllowed = "move";
  ev.currentTarget.classList.add('dragging');
}
function personDragEnd(ev){
  draggingPerson = false;
  ev.currentTarget.classList.remove('dragging');
  scheduleTipHide();
}
function dragOver(ev){
  if(!dragInfo) return;   // 區晶片等其他拖曳不在此處理
  ev.preventDefault();
  ev.dataTransfer.dropEffect = "move";
  ev.currentTarget.classList.add('dropover');
}
function dragLeave(ev){ ev.currentTarget.classList.remove('dropover'); }
function dropChip(ev){
  ev.preventDefault();
  ev.currentTarget.classList.remove('dropover');
  if(!dragInfo) return;
  const dstDate = ev.currentTarget.dataset.date;
  const dstZone = ev.currentTarget.dataset.zone;

  /* ── 單一個案搬移（從釘選名單拖出）── */
  if(dragInfo.type==='person'){
    const {dateISO:srcDate, zone:srcZone, tagIdx, pIdx} = dragInfo;
    dragInfo = null;
    if(srcDate===dstDate && srcZone===dstZone) return;
    const src = getRec(curOrg, srcDate, srcZone);
    if(!src || !src.tags[tagIdx] || !src.tags[tagIdx].people[pIdx]) return;
    const tag = src.tags[tagIdx];
    const person = tag.people.splice(pIdx, 1)[0];
    src.count = Math.max(0, (src.count||0) - 1);
    if(tag.people.length===0) src.tags.splice(tagIdx, 1);
    const dst = ensureCell(curOrg, dstDate, dstZone);
    let dtag = dst.tags.find(t=>t.name===tag.name);
    if(!dtag){ dtag = {name:tag.name, people:[]}; dst.tags.push(dtag); }
    dtag.people.push(person);
    dst.count = (dst.count||0) + 1;
    hideTipNow(); saveData(); render();
    toast(`已將 ${person.name}（${tag.name}）移到 ${dstZone}區`);
    return;
  }

  /* ── 整個標籤搬移（同名標籤不合併、保持獨立）── */
  const {dateISO:srcDate, zone:srcZone, idx} = dragInfo;
  dragInfo = null;
  if(srcDate===dstDate && srcZone===dstZone) return;

  const src = getRec(curOrg, srcDate, srcZone);
  if(!src || !src.tags[idx]) return;
  const tag = src.tags.splice(idx, 1)[0];
  const n = tag.people ? tag.people.length : 0;
  if(n) src.count = Math.max(0, (src.count||0) - n);
  const dst = ensureCell(curOrg, dstDate, dstZone);
  dst.tags.push(tag);
  if(n) dst.count = (dst.count||0) + n;
  saveData(); render();
  toast(`已將「${tag.name}」移到 ${dstZone}區${n?`（含 ${n} 人，獨立標籤）`:""}`);
}

/* ===== 拖到標籤上 → 合併成一大群標籤（拖到空白處則保持獨立）===== */
function chipDragOver(ev){
  if(!dragInfo) return;
  ev.preventDefault(); ev.stopPropagation();
  ev.dataTransfer.dropEffect = "move";
  ev.currentTarget.classList.add('dropover');
}
function chipDragLeave(ev){ ev.currentTarget.classList.remove('dropover'); }
function chipDrop(ev, dstDate, dstZone, dstIdx){
  ev.preventDefault(); ev.stopPropagation();
  ev.currentTarget.classList.remove('dropover');
  document.querySelectorAll('td.dists.dropover').forEach(td=>td.classList.remove('dropover'));
  if(!dragInfo) return;
  const dst = getRec(curOrg, dstDate, dstZone);
  if(!dst || !dst.tags[dstIdx]){ dragInfo=null; return; }

  /* 個案拖到標籤上 → 併入該標籤 */
  if(dragInfo.type==='person'){
    const {dateISO:sd, zone:sz, tagIdx, pIdx} = dragInfo; dragInfo=null;
    const src = getRec(curOrg, sd, sz);
    if(!src || !src.tags[tagIdx] || !src.tags[tagIdx].people[pIdx]) return;
    const sameCell = (sd===dstDate && sz===dstZone);
    if(sameCell && tagIdx===dstIdx) return;
    const stag = src.tags[tagIdx];
    const person = stag.people.splice(pIdx,1)[0];
    let dIdx = dstIdx;
    if(stag.people.length===0){
      src.tags.splice(tagIdx,1);
      if(sameCell && tagIdx < dIdx) dIdx--;
    }
    if(!sameCell){ src.count=Math.max(0,(src.count||0)-1); dst.count=(dst.count||0)+1; }
    dst.tags[dIdx].people.push(person);
    hideTipNow(); saveData(); render();
    toast(`已將 ${person.name} 併入「${dst.tags[dIdx].name}」`);
    return;
  }

  /* 標籤拖到標籤上 → 合併成一大群 */
  const {dateISO:sd, zone:sz, idx} = dragInfo; dragInfo=null;
  const src = getRec(curOrg, sd, sz);
  if(!src || !src.tags[idx]) return;
  const sameCell = (sd===dstDate && sz===dstZone);
  if(sameCell && idx===dstIdx) return;
  const stag = src.tags[idx];
  const dtag0 = dst.tags[dstIdx];
  if(stag.name!==dtag0.name && !confirm(`「${stag.name}」與「${dtag0.name}」名稱不同，合併後標籤名為「${dtag0.name}」，確定併成一大群？`)) return;
  src.tags.splice(idx,1);
  let dIdx = dstIdx;
  if(sameCell && idx < dIdx) dIdx--;
  const dtag = dst.tags[dIdx];
  const n = stag.people ? stag.people.length : 0;
  dtag.people = (dtag.people||[]).concat(stag.people||[]);
  if(!sameCell && n){ src.count=Math.max(0,(src.count||0)-n); dst.count=(dst.count||0)+n; }
  saveData(); render();
  toast(`已合併成「${dtag.name}(${dtag.people.length})」大群標籤，釘選後可再勾選拆分`);
}

/* ===== 個案名單浮標視窗（錨定＋可捲動＋可釘選＋勾選拆分）===== */
const tipEl = document.getElementById('tip');
let tipPinned = false;
let tipKey = null;         // 目前顯示的 "date|zone|tagIdx"
let tipHideTimer = null;
let tipCtx = null;         // {dateISO, zone, idx} 供拆分使用
let tipSel = new Set();    // 已勾選的個案索引

function buildTipContent(dateISO, zone, idx){
  const rec = getRec(curOrg, dateISO, zone);
  if(!rec) return false;
  const tag = rec.tags[idx];
  if(!tag) return false;
  const ppl = tag.people || [];
  tipCtx = {dateISO, zone, idx};
  tipSel = new Set();
  document.getElementById('tipTitle').textContent = `📍 ${tag.name}（${tagCount(tag)||"—"} 人）｜${dateISO} ${zone}區`;
  let h = "";
  if(tagIsInst(tag)){
    h += `<div style="background:#fff7e6;border:1px solid #ffe0a3;border-radius:8px;padding:7px 9px;margin-bottom:7px;font-size:12px;">
      🏥 機構代表人數：<b style="font-size:14px;color:#e67e22;">${tagCount(tag)}</b>
      <button class="btn" style="padding:2px 9px;font-size:11px;margin-left:8px;" onclick="editInstQty('${dateISO}','${zone}',${idx})">✏️ 編輯數量</button>
      <div style="color:var(--muted);margin-top:3px;line-height:1.4;">此標籤代表一家機構（依地址前綴「(XX機構)」判定），人數已由「實際申報」自動帶入，可手動修改（獨立於下方個案明細）</div>
    </div>`;
  }
  if(ppl.length===0){
    h += `<div class="none">${tagIsInst(tag)?"此機構標籤尚無個案明細，人數以上方設定為準":"此標籤為手動新增，尚無個案明細"}</div>`;
  }else{
    ppl.forEach((p,i)=>{
      h += `<div class="person" draggable="true" ondragstart="personDragStart(event,'${dateISO}','${zone}',${idx},${i})" ondragend="personDragEnd(event)"><div class="pname"><input type="checkbox" class="psel" title="勾選後可拆分成小標籤" onclick="event.stopPropagation()" onchange="tipToggleSel(${i},this.checked)"><span class="phandle">⠿</span>${i+1}. ${p.name}</div>`;
      if(p.last) h += `<div class="plast">🗓 上次訪視 ${p.last}</div>`;
      if(p.addr) h += `<div class="paddr">🏠 ${p.addr}</div>`;
      if(p.tube) h += `<div class="ptube">🩺 ${p.tube}</div>`;
      if(p.note) h += `<div class="pnote">📝 ${p.note}</div>`;
      h += `</div>`;
    });
  }
  document.getElementById('tipBody').innerHTML = h;
  const foot = document.getElementById('tipFoot');
  foot.style.display = ppl.length>=2 ? "block" : "none";
  const b = document.getElementById('splitBtn');
  b.disabled = true;
  b.textContent = "✂ 勾選個案後拆分成小標籤";
  return true;
}
function tipToggleSel(i, on){
  if(on) tipSel.add(i); else tipSel.delete(i);
  const b = document.getElementById('splitBtn');
  if(b){
    b.disabled = tipSel.size===0;
    b.textContent = tipSel.size ? `✂ 拆分選取的 ${tipSel.size} 人成小標籤` : "✂ 勾選個案後拆分成小標籤";
  }
}
function splitSelected(){
  if(!tipCtx || tipSel.size===0) return;
  const rec = getRec(curOrg, tipCtx.dateISO, tipCtx.zone);
  const tag = rec && rec.tags[tipCtx.idx];
  if(!tag) return;
  if(tipSel.size >= tag.people.length){ toast("已全選：整個標籤直接拖曳即可，不需拆分"); return; }
  const idxs = [...tipSel].sort((a,b)=>a-b);
  const moved = idxs.map(i=>tag.people[i]);
  [...idxs].reverse().forEach(i=>tag.people.splice(i,1));
  rec.tags.splice(tipCtx.idx+1, 0, {name:tag.name, people:moved});
  hideTipNow(); saveData(); render();
  toast(`已拆分出「${tag.name}(${moved.length})」小標籤，可直接拖曳搬區`);
}
function positionTip(anchorEl){
  const r = anchorEl.getBoundingClientRect();
  const W = 360, pad = 8;
  let x = Math.min(Math.max(pad, r.left), window.innerWidth - W - pad);
  tipEl.style.left = x + "px";
  const spaceBelow = window.innerHeight - r.bottom - 14;
  const spaceAbove = r.top - 14;
  const body = document.querySelector('#tip .tip-body');
  const footH = document.getElementById('tipFoot').style.display!=="none" ? 46 : 0;
  if(spaceBelow >= 180 || spaceBelow >= spaceAbove){
    tipEl.style.top = (r.bottom + 6) + "px";
    tipEl.style.bottom = "";
    body.style.maxHeight = Math.max(140, Math.min(460, spaceBelow - 46 - footH)) + "px";
  }else{
    tipEl.style.top = "";
    tipEl.style.bottom = (window.innerHeight - r.top + 6) + "px";
    body.style.maxHeight = Math.max(140, Math.min(460, spaceAbove - 46 - footH)) + "px";
  }
}
function chipEnter(ev, dateISO, zone, idx){
  clearTimeout(tipHideTimer);
  if(tipPinned) return;                    // 已釘選就不換內容
  const key = `${dateISO}|${zone}|${idx}`;
  if(!buildTipContent(dateISO, zone, idx)) return;
  tipKey = key;
  tipEl.style.display = "block";
  tipEl.classList.remove('pinned');
  document.getElementById('tipHint').textContent = "點標籤釘選後，可勾選拆分或拖曳個案列搬區";
  positionTip(ev.currentTarget);
}
function chipLeave(){ scheduleTipHide(); }
function tipHoverIn(){ clearTimeout(tipHideTimer); }   // 滑進視窗 → 不關閉，可捲動
function tipHoverOut(){ scheduleTipHide(); }
function scheduleTipHide(){
  if(tipPinned || draggingPerson) return;
  clearTimeout(tipHideTimer);
  tipHideTimer = setTimeout(()=>{ tipEl.style.display="none"; tipKey=null; }, 320);
}
function chipPin(ev, dateISO, zone, idx){
  ev.stopPropagation();
  const key = `${dateISO}|${zone}|${idx}`;
  if(tipPinned && tipKey===key){ hideTipNow(); return; }  // 再點一次取消釘選
  if(!buildTipContent(dateISO, zone, idx)) return;
  tipKey = key;
  tipPinned = true;
  tipEl.style.display = "block";
  tipEl.classList.add('pinned');
  document.getElementById('tipHint').textContent = "已釘選｜勾選個案可拆分小標籤，或拖曳⠿單獨搬移";
  positionTip(ev.currentTarget);
}
function hideTipNow(){
  tipPinned = false;
  tipEl.style.display = "none";
  tipEl.classList.remove('pinned');
  tipKey = null;
  tipCtx = null;
  tipSel = new Set();
  clearTimeout(tipHideTimer);
}
function hideTip(){ if(!tipPinned){ tipEl.style.display="none"; tipKey=null; } }
// 點視窗以外處 → 關閉釘選
document.addEventListener('click', (e)=>{
  if(tipPinned && !tipEl.contains(e.target)) hideTipNow();
});
// 捲動頁面時關閉未釘選的視窗（位置會跑掉）
window.addEventListener('scroll', ()=>{ if(!tipPinned) hideTip(); }, true);

/* ===== 快速移除 ===== */
function quickRemove(ev, dateISO, zone, idx){
  ev.stopPropagation();
  hideTipNow();
  const rec = getRec(curOrg, dateISO, zone);
  if(!rec || !rec.tags[idx]) return;
  const tag = rec.tags[idx];
  const ppl = tag.people ? tag.people.length : 0;
  if(ppl && !confirm(`「${tag.name}」含 ${ppl} 筆個案資料，確定移除？（人數不會自動變更）`)) return;
  rec.tags.splice(idx, 1);
  saveData(); render();
  toast(`已移除 ${tag.name}`);
}

/* ===== 操作 ===== */
function editNurse(dateISO, zone, ev){
  hideTipNow();
  const td = ev.currentTarget;
  if(td.querySelector('select')) return;   // 已開啟下拉選單
  const rec = getRec(curOrg, dateISO, zone);
  const cur = rec && rec.nurse ? rec.nurse : "";
  const list = NURSES[curOrg] || [];
  let opts = `<option value="">（清除）</option>` +
    list.map(n=>`<option value="${n}"${n===cur?" selected":""}>${n}</option>`).join("");
  if(cur && !list.includes(cur)) opts += `<option value="${cur}" selected>${cur}</option>`;  // 保留舊自訂值
  td.innerHTML = `<select style="font-family:inherit;font-size:12.5px;padding:2px 3px;border:1px solid var(--brand2);border-radius:6px;max-width:68px;background:#fff;color:#4a6da7;">${opts}</select>`;
  const sel = td.querySelector('select');
  sel.addEventListener('click', e=>e.stopPropagation());
  sel.addEventListener('change', ()=>{
    ensureCell(curOrg, dateISO, zone).nurse = sel.value;
    saveData(); render();
  });
  sel.addEventListener('blur', ()=>render());
  sel.focus();
}
/* ===== 機構標籤：編輯代表人數 ===== */
function editInstQty(dateISO, zone, idx){
  const rec = getRec(curOrg, dateISO, zone);
  const tag = rec && rec.tags[idx];
  if(!tag) return;
  const cur = tagCount(tag);
  const v = prompt(`「${tag.name}」機構代表人數：`, cur);
  if(v===null) return;
  const n = parseInt(v, 10);
  if(isNaN(n) || n<0){ toast("請輸入 0 或正整數"); return; }
  tag.qty = n;
  hideTipNow(); saveData(); render();
  toast(`已設定「${tag.name}」代表 ${n} 人`);
}

/* ===== 護理師每月個案統計 ===== */
function nurseStatsFor(org, ym){
  const [Y,M] = ym.split("-").map(Number);
  const days = new Date(Y, M, 0).getDate();
  const stat = {};
  for(let d=1; d<=days; d++){
    const dateISO = `${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = data[org][dateISO] || {};
    for(const [z, r0] of Object.entries(rec)){
      const rr = normalizeRec(r0);
      const nu = rr.nurse;
      if(!nu) continue;
      if(!stat[nu]) stat[nu] = {cases:0, days:new Set(), zones:0};
      stat[nu].cases += (rr.count||0);
      stat[nu].days.add(dateISO);
      stat[nu].zones += 1;
    }
  }
  (NURSES[org]||[]).forEach(n=>{ if(!stat[n]) stat[n]={cases:0, days:new Set(), zones:0}; });
  return Object.entries(stat).sort((a,b)=> b[1].cases-a[1].cases || a[0].localeCompare(b[0]));
}
function showNurseStats(){
  const [Y,M] = curYM.split("-").map(Number);
  const rows = nurseStatsFor(curOrg, curYM);
  const tot = rows.reduce((s,[,v])=>s+v.cases,0);
  let h = `<div style="font-size:12.5px;color:var(--muted);margin-bottom:8px;">${ORG_NAME[curOrg]}｜${Y}年${M}月　（個案數＝該護理師負責分區的「人數」加總）</div>`;
  h += `<table style="width:100%;border-collapse:collapse;font-size:13px;min-width:0;">
    <thead><tr>
      <th style="border:1px solid var(--line);padding:6px;background:var(--brand);color:#fff;">護理師</th>
      <th style="border:1px solid var(--line);padding:6px;background:var(--brand);color:#fff;">個案數</th>
      <th style="border:1px solid var(--line);padding:6px;background:var(--brand);color:#fff;">出勤天數</th>
      <th style="border:1px solid var(--line);padding:6px;background:var(--brand);color:#fff;">負責分區次數</th>
    </tr></thead><tbody>`;
  rows.forEach(([n,s])=>{
    h += `<tr>
      <td style="border:1px solid var(--line);padding:6px;font-weight:bold;">${n}</td>
      <td style="border:1px solid var(--line);padding:6px;text-align:center;font-weight:bold;color:var(--brand);">${s.cases}</td>
      <td style="border:1px solid var(--line);padding:6px;text-align:center;">${s.days.size}</td>
      <td style="border:1px solid var(--line);padding:6px;text-align:center;">${s.zones}</td>
    </tr>`;
  });
  h += `</tbody></table><div style="margin-top:8px;font-size:12.5px;color:var(--muted);">合計個案數：<b>${tot}</b></div>`;
  document.getElementById('nurseModalTitle').textContent = `📊 ${ORG_NAME[curOrg]} 護理師每月個案統計`;
  document.getElementById('nurseStatsBody').innerHTML = h;
  document.getElementById('nurseModalBg').classList.add('show');
}
function closeNurseStats(){ document.getElementById('nurseModalBg').classList.remove('show'); }
function exportNurseCSV(){
  const [Y,M] = curYM.split("-").map(Number);
  const rows = nurseStatsFor(curOrg, curYM);
  const out = [["護理師","個案數","出勤天數","負責分區次數"]];
  rows.forEach(([n,s])=> out.push([n, s.cases, s.days.size, s.zones]));
  const csv = "﻿" + out.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `${ORG_NAME[curOrg]}_${curYM}_護理師統計.csv`;
  a.click();
}

function resetRange(){
  const [Y,M] = curYM.split("-").map(Number);
  document.getElementById('dayFrom').value = 1;
  document.getElementById('dayTo').value = new Date(Y, M, 0).getDate();
  render();
}
function switchOrg(org){
  curOrg = org;
  hideTipNow();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.org===org));
  render();
}
function navMonth(dir){
  let [Y,M] = curYM.split("-").map(Number);
  M += dir;
  if(M===0){M=12;Y--;} if(M===13){M=1;Y++;}
  curYM = `${Y}-${String(M).padStart(2,'0')}`;
  document.getElementById('dayFrom').value = "";
  document.getElementById('dayTo').value = "";
  render();
}
function clearMonth(){
  if(!confirm(`確定清除 ${ORG_NAME[curOrg]} ${curYM} 的所有資料？`)) return;
  for(const d of Object.keys(data[curOrg])) if(d.startsWith(curYM)) delete data[curOrg][d];
  saveData(); render(); toast("已清除本月資料");
}

/* ===== 快選 Modal ===== */
function openModal(dateISO, zone){
  hideTipNow();
  editing = {org:curOrg, dateISO, zone};
  const rec = getRec(curOrg, dateISO, zone);
  tempTags = rec ? rec.tags.map(t=>({name:t.name, people:t.people||[], qty:t.qty, isInst:t.isInst})) : [];
  document.getElementById('modalTitle').textContent = `${dateISO}（週${WEEK[new Date(dateISO).getDay()]}）｜${zone}區`;
  document.getElementById('editCount').value = rec ? rec.count : "";
  document.getElementById('customInput').value = "";
  renderPicker();
  document.getElementById('modalBg').classList.add('show');
}
function renderPicker(){
  const sel = document.getElementById('selectedArea');
  if(tempTags.length===0){
    sel.innerHTML = '<div class="empty">尚未選擇，點下方色塊即可加入</div>';
  }else{
    sel.innerHTML = tempTags.map((t,i)=>{
      const c = colorOf(curOrg, t.name);
      const n = tagCount(t);
      const badge = n ? `<span class="cbadge">${n}</span>` : "";
      return `<span class="chip" style="${c?`background:${c};`:""}">${t.name}${badge}<span class="x" onclick="tempRemove(${i})">✕</span></span>`;
    }).join("");
  }
  const pg = document.getElementById('pickerGroups');
  pg.innerHTML = GROUPS[curOrg].map((g,gi)=>{
    const btns = g.names.map(name=>{
      const on = tempTags.some(t=>t.name===name) ? " on" : "";
      return `<span class="pick${on}" style="background:${g.color}" onclick="togglePick('${name}')">${name}</span>`;
    }).join("");
    return `<div class="pick-group"><div class="gtitle">第 ${gi+1} 組</div>${btns}</div>`;
  }).join("");
}
function togglePick(name){
  const has = tempTags.some(t=>t.name===name);
  if(has){
    const withPpl = tempTags.reduce((s,t)=>s+(t.name===name && t.people && t.people.length ? t.people.length : 0), 0);
    if(withPpl && !confirm(`「${name}」共 ${withPpl} 筆個案資料，取消將移除全部同名標籤，確定？`)) return;
    tempTags = tempTags.filter(t=>t.name!==name);
  }else{
    tempTags.push({name, people:[]});
  }
  renderPicker();
}
function tempRemove(i){
  const t = tempTags[i];
  const n = t && t.people ? t.people.length : 0;
  if(n && !confirm(`「${t.name}」含 ${n} 筆個案資料，確定移除？`)) return;
  tempTags.splice(i,1); renderPicker();
}
function addCustom(){
  const v = document.getElementById('customInput').value.trim();
  if(!v) return;
  tempTags.push({name:v, people:[]});
  document.getElementById('customInput').value = "";
  renderPicker();
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); editing=null; }
function saveCell(){
  if(!editing) return;
  const cnt = parseInt(document.getElementById('editCount').value)||0;
  if(!data[editing.org][editing.dateISO]) data[editing.org][editing.dateISO]={};
  const rec0 = data[editing.org][editing.dateISO][editing.zone];
  data[editing.org][editing.dateISO][editing.zone] = {
    count: cnt,
    tags: tempTags.map(t=>{ const o={name:t.name, people:t.people||[]}; if(t.qty!=null && t.qty!=="") o.qty=+t.qty; if(t.isInst) o.isInst=true; return o; }),
    nurse: rec0 && rec0.nurse ? rec0.nurse : ""
  };
  saveData(); closeModal(); render(); toast("已更新");
}
function deleteCell(){
  if(!editing) return;
  const rec = data[editing.org][editing.dateISO];
  if(rec){ delete rec[editing.zone]; if(Object.keys(rec).length===0) delete data[editing.org][editing.dateISO]; }
  saveData(); closeModal(); render(); toast("已刪除");
}

/* CSV 匯出 */
function exportCSV(){
  const [Y,M] = curYM.split("-").map(Number);
  const days = new Date(Y, M, 0).getDate();
  const hid = hiddenZones();
  const zones = zonesForMonth(curOrg, curYM).filter(z=>!hid.has(z));
  let rows = [["日期","週", ...zones.flatMap(z=>[`${z}區人數`,`${z}區護理師`,`${z}區行政區`])]];
  for(let d=1; d<=days; d++){
    const dateISO = `${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const wd = WEEK[new Date(Y, M-1, d).getDay()];
    const rec = data[curOrg][dateISO]||{};
    const row=[d, wd];
    for(const z of zones){
      const info = rec[z] ? normalizeRec(rec[z]) : null;
      const dd = info ? info.tags.map(t=>{
        const c = tagCount(t);
        return c ? `${t.name}(${c})` : t.name;
      }).join("、") : "";
      row.push(info?info.count:"", info&&info.nurse?info.nurse:"", dd);
    }
    rows.push(row);
  }
  const csv = "﻿" + rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `${ORG_NAME[curOrg]}_${curYM}_行程表.csv`;
  a.click();
}

/* Toast */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2600);
}

/* 拖曳上傳 */
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e=>{e.preventDefault(); dz.classList.add('drag');});
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag'));
dz.addEventListener('drop', e=>{
  e.preventDefault(); dz.classList.remove('drag');
  handleFiles([...e.dataTransfer.files]);
});
document.getElementById('fileInput').addEventListener('change', e=>{
  handleFiles([...e.target.files]);
  e.target.value="";
});
document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });
document.getElementById('nurseModalBg').addEventListener('click', e=>{ if(e.target.id==='nurseModalBg') closeNurseStats(); });

/* 啟動 */
(async ()=>{
  const now = new Date();
  curYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  initUser();
  await loadData();
  render();
  if(hasRemote) setInterval(pollRemote, 45000);  // 每 45 秒自動拉取他人更新
})();
</script>
